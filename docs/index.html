<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Web Geometry Demo</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; background: #05070a; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
      #root { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
      #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
      #overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
      #hud {
        position: absolute; left: 12px; top: 12px; z-index: 5;
        background: rgba(0, 0, 0, 0.55); padding: 10px 12px; border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.18); min-width: 230px; backdrop-filter: blur(4px);
      }
      #hud h1 { margin: 0 0 8px; font-size: 13px; font-weight: 600; }
      #hud p { margin: 3px 0; font-size: 12px; opacity: 0.92; }
      #startBtn {
        position: absolute; right: 12px; top: 12px; z-index: 6;
        border: 0; border-radius: 10px; padding: 10px 12px; font-weight: 600;
        background: #4c8dff; color: #fff; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <video id="video" playsinline muted autoplay></video>
      <canvas id="threeLayer"></canvas>
      <canvas id="overlay"></canvas>
      <div id="hud">
        <h1>Web Geometry Demo</h1>
        <p id="cameraStatus">camera: idle</p>
        <p id="edgeStatus">edges: -</p>
        <p id="imuStatus">imu: waiting</p>
        <p id="orientationStatus">orientation: -</p>
        <p id="poseStatus">pose: waiting</p>
      </div>
      <button id="startBtn" type="button">Start Demo</button>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
